<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pontos Cantados</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff5f7;--surface:#ffffff;--border:rgba(196,57,107,0.15);--gold:#c4396b;--gold-light:#e8688a;--gold-dim:rgba(196,57,107,0.08);--text:#2a1a22;--text-dim:rgba(80,30,50,0.5);--red:#b84040;--red-dim:rgba(184,64,64,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100vh;display:flex;flex-direction:column}
header{background:linear-gradient(135deg,#c0405a,#d4607a 60%,#e07a90);padding:12px 16px 10px;position:sticky;top:0;z-index:500;box-shadow:0 2px 20px rgba(180,60,90,.25)}
.header-row2{display:flex;gap:6px;align-items:center;margin-top:9px;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
.header-row2::-webkit-scrollbar{display:none}
.hfbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);border-radius:20px;color:rgba(255,255,255,.85);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;padding:5px 13px;transition:all .18s;white-space:nowrap;flex-shrink:0}
.hfbtn:hover,.hfbtn.active{background:rgba(255,255,255,.9);color:var(--gold);border-color:rgba(255,255,255,.9)}
.hi{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:nowrap;overflow:hidden}
header h1{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:600;color:#fff;letter-spacing:-.01em;white-space:nowrap}
header p{color:rgba(255,255,255,.6);font-size:.7rem;margin-top:1px}
.hr{display:flex;gap:6px;align-items:center;flex-shrink:0}
.sw{position:relative}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.5);pointer-events:none}
#searchInput{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:10px;color:#fff;font-family:'Crimson Pro',serif;font-size:.9rem;padding:7px 10px 7px 30px;outline:none;width:160px;transition:all .2s}
#searchInput::placeholder{color:rgba(255,255,255,.45)}
#searchInput:focus{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6);width:185px}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.28);border-radius:10px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:7px 11px;display:flex;align-items:center;gap:5px;transition:background .18s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.25)}
.badge-admin{background:rgba(255,255,255,.22);border-radius:20px;color:#fff;font-size:.68rem;padding:2px 6px}
.cb{background:#fff;border-bottom:1px solid rgba(196,57,107,.1);padding:0 12px;position:sticky;top:90px;z-index:400;box-shadow:0 2px 8px rgba(180,60,90,.06)}
.ci{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:6px;padding:8px 0}
.ci-filters{display:flex;align-items:center;gap:6px;flex:1;overflow-x:auto;scrollbar-width:none;min-width:0}
.ci-filters::-webkit-scrollbar{display:none}
.layout-btns{display:flex;gap:2px;background:#f5eaed;border-radius:8px;padding:3px;flex-shrink:0}
.filter-select{background:#fdf0f3;border:1.5px solid rgba(196,57,107,.2);border-radius:10px;color:var(--text);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;letter-spacing:0;padding:6px 26px 6px 10px;outline:none;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' fill='none' stroke='%238a6070' stroke-width='2' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 7px center;transition:border-color .18s;flex-shrink:0;max-width:130px}
.filter-select:focus{border-color:var(--gold)}
.filter-btn{background:#fdf0f3;border:1.5px solid rgba(196,57,107,.2);border-radius:20px;color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;padding:5px 12px;transition:all .18s;white-space:nowrap;flex-shrink:0}
.filter-btn:hover,.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#fff}
.layout-btn{background:none;border:none;border-radius:6px;color:var(--text-dim);cursor:pointer;padding:5px 8px;transition:all .18s;display:flex;align-items:center;font-size:.82rem}
.layout-btn.active{background:#fff;color:var(--gold);box-shadow:0 1px 4px rgba(180,60,90,.12)}
.main{max-width:900px;margin:20px auto 0;padding:0 16px;display:grid;gap:14px}
.bottom-space{height:40vh;min-height:120px}
.main.layout-list{display:flex;flex-direction:column;gap:0}
.list-item-row{background:#fff;padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f5e0e5;transition:background .15s;cursor:pointer;overflow:hidden;width:100%;box-sizing:border-box}
.list-item-row:first-child{border-radius:12px 12px 0 0}
.list-item-row:last-child{border-radius:0 0 12px 12px;border-bottom:none}
.list-item-row:hover{background:#fff8f9}
.list-item-row.destaque{background:linear-gradient(135deg,#fffbe8,#fff8e0);border-left:3px solid #c8a000}
.list-item-row.destaque:hover{background:linear-gradient(135deg,#fff8d8,#fff5d0)}
.li-main{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;gap:2px}
.li-top{display:flex;align-items:center;gap:6px;min-width:0;flex-wrap:nowrap;overflow:hidden}
.li-name{font-weight:600;font-size:.84rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;max-width:180px}
.li-meta{color:var(--text-dim);font-size:.74rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.li-actions{display:flex;gap:5px;align-items:center;flex-shrink:0}
.sessao-banner{background:linear-gradient(135deg,#fffbe8,#fff5d0);border:1px solid #e8c860;border-left:3px solid #c8a000;border-radius:8px;padding:12px 18px;display:flex;align-items:center;gap:10px;font-family:'DM Sans',sans-serif;font-size:.78rem;letter-spacing:.04em;color:#8c5a00;font-weight:700}
.sessao-banner .flame{font-size:16px;animation:flicker 2s ease-in-out infinite alternate}
@keyframes flicker{0%{opacity:.8;transform:scale(1)}100%{opacity:1;transform:scale(1.05)}}

/* ── APRENDER / LOTE ── */
.aprender-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#e8f4f0,#d4ede6);border:1px solid #b8ddd4;border-radius:20px;color:#2a7a60;font-family:'DM Sans',sans-serif;font-size:.67rem;font-weight:600;letter-spacing:.03em;padding:2px 9px;text-transform:uppercase;white-space:nowrap}
.card.selectable{position:relative}
.card.selecionado{box-shadow:0 0 0 2px var(--gold),0 4px 16px rgba(196,57,107,.1)}
.batch-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#2a7a60,#3a9a78);padding:10px 16px;align-items:center;justify-content:center;gap:8px;z-index:700;box-shadow:0 -4px 18px rgba(0,0,0,.2);flex-wrap:wrap;transition:bottom .2s}
.batch-bar.open{display:flex}
/* Batch bar sobe quando a admin bar está visível */
.admin-mode .batch-bar.open{bottom:54px}
.batch-info{color:#fff;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;margin-right:4px}
.batch-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);border-radius:8px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.75rem;padding:7px 12px;transition:all .18s;white-space:nowrap}
.batch-btn:hover{background:rgba(255,255,255,.35)}
.batch-btn.danger{background:rgba(184,64,64,.4);border-color:rgba(184,64,64,.6)}
.batch-btn.cancel{background:rgba(0,0,0,.2)}

/* ── CUSTOM AUDIO PLAYER ── */
.cplayer{background:linear-gradient(135deg,#fff0f4,#fde8ed);border:1px solid rgba(196,57,107,.15);border-radius:10px;padding:10px 12px;margin-top:8px}
.cplayer-time{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text-dim);font-family:monospace;margin-bottom:6px}
.cplayer-bar-wrap{position:relative;height:28px;display:flex;align-items:center;cursor:pointer;touch-action:none}
.cplayer-track{width:100%;height:5px;background:rgba(196,57,107,.15);border-radius:3px;position:relative;overflow:visible}
.cplayer-fill{height:100%;background:linear-gradient(90deg,#c4396b,#e8688a);border-radius:3px;transition:width .1s linear;pointer-events:none}
.cplayer-thumb{position:absolute;top:50%;width:16px;height:16px;background:#c4396b;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(196,57,107,.4);pointer-events:none}
.cplayer-controls{display:flex;align-items:center;gap:8px;margin-top:8px}
.cplayer-btn{background:var(--gold);border:none;border-radius:8px;color:#fff;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;transition:all .18s}
.cplayer-btn:hover{background:#b02d5a}
.cplayer-segment{font-size:.7rem;color:#8c5a00;background:#fffbe8;border:1px solid #e8c860;border-radius:6px;padding:3px 8px;flex:1;text-align:center}

/* ── SEGMENTOS ── */
.seg-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fdf5f7;border:1.5px solid rgba(196,57,107,.2);border-radius:10px;cursor:pointer;transition:all .18s}
.seg-toggle:hover{border-color:var(--gold)}
.seg-toggle input[type=checkbox]{accent-color:var(--gold);width:16px;height:16px;flex-shrink:0;cursor:pointer}
.seg-toggle span{font-size:.85rem;color:var(--text)}
.seg-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.seg-row{background:#fafafa;border:1.5px solid #eee;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:8px;position:relative}
.seg-row-top{display:flex;gap:8px;align-items:center}
.seg-row-times{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.seg-num{background:var(--gold);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.seg-name{flex:1;background:transparent;border:1px solid #eee;border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;padding:7px 10px;outline:none}
.seg-name:focus{border-color:var(--gold)}
.seg-time{background:transparent;border:1px solid #eee;border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;padding:7px 10px;outline:none;text-align:center}
.seg-time:focus{border-color:var(--gold)}
.seg-time::placeholder{color:#ccc;font-size:.78rem}
.seg-del{background:none;border:none;color:#e0a0a0;cursor:pointer;font-size:1.1rem;padding:0 2px;flex-shrink:0;transition:color .18s}
.seg-del:hover{color:#e05555}
.btn-add-seg{background:transparent;border:1.5px dashed rgba(196,57,107,.3);border-radius:8px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:8px;width:100%;transition:all .18s;margin-top:2px}
.btn-add-seg:hover{background:var(--gold-dim);border-color:var(--gold)}
.btn-mark{background:rgba(196,57,107,.08);border:1px solid rgba(196,57,107,.25);border-radius:6px;color:var(--gold);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.72rem;padding:5px 8px;white-space:nowrap;transition:all .18s;flex-shrink:0}
.btn-mark:hover{background:var(--gold);color:#fff}
.seg-hint{font-size:.73rem;color:var(--text-dim);margin-bottom:8px}

/* ── TRECHO ÚNICO ── */
.single-timing{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.single-timing-row{display:flex;flex-direction:column;gap:4px}
.single-timing-row label{font-size:.7rem;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.single-timing-input{display:flex;gap:4px;align-items:center}

/* ── ÁUDIO / NOSSOS PONTOS ── */
.upload-area{border:2px dashed rgba(196,57,107,.3);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;background:#fdf5f7}
.upload-area:hover{border-color:var(--gold);background:#fffbe8}
.upload-area input{display:none}
.upload-label{font-family:'DM Sans',sans-serif;font-size:.83rem;color:var(--text-dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.upload-progress{height:4px;background:#f0d0d8;border-radius:4px;margin-top:8px;overflow:hidden;display:none}
.upload-progress-bar{height:100%;background:linear-gradient(90deg,var(--gold),#e8688a);border-radius:4px;width:0;transition:width .3s}
.nossos-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(196,57,107,.08);border:1px solid rgba(196,57,107,.25);color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.67rem;font-weight:500;letter-spacing:.04em;padding:2px 9px;border-radius:20px;text-transform:uppercase}

/* ── LINHAS MODAL ── */
.linha-item{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fdf5f7;border:1px solid rgba(196,57,107,.15);border-radius:8px;transition:all .15s}
.linha-item:hover{border-color:rgba(196,57,107,.3);background:#fce8ef}
.linha-item-name{flex:1;font-size:.85rem;color:var(--text)}
.btn-rm-linha{background:none;border:none;color:#e0a0a0;cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px;transition:color .18s}
.btn-rm-linha:hover{color:#e05555}
.linhas-add-row{display:flex;gap:8px;margin-top:4px}
.linhas-add-row input{flex:1}
.linhas-empty{text-align:center;padding:20px;color:var(--text-dim);font-size:.82rem}

/* ── CARDS ── */
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(180,60,90,.07);overflow:hidden;transition:transform .22s,box-shadow .22s;display:flex;flex-direction:column;animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(180,60,90,.13)}
.card.destaque{box-shadow:0 2px 16px rgba(180,60,90,.08),0 0 0 2px #e8c86080}
.card.destaque:hover{box-shadow:0 6px 30px rgba(196,57,107,.12),0 0 0 2px #d4a83080}
.card-top-bar{background:linear-gradient(135deg,#fde8ed,#fce8ef);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card.destaque .card-top-bar{background:linear-gradient(135deg,#fffbe8,#fff5d0)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 18px 10px;gap:12px}
.card-title-wrap{flex:1;min-width:0}
.destaque-tag{background:linear-gradient(135deg,#8c5a00,#c88c00);border-radius:8px;color:#fff8e0;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:4px 10px;display:inline-flex;align-items:center;gap:5px;align-self:flex-start;letter-spacing:.01em}
.card-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.25}
.card-meta{margin-top:4px;font-size:.78rem;color:var(--text-dim);display:flex;flex-wrap:wrap;gap:4px 10px}
.meta-item{display:flex;align-items:center;gap:4px}
.meta-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.4;flex-shrink:0}
.cat-badge{display:inline-block;background:#fce8ef;border-radius:20px;color:#d4607a;font-size:.67rem;font-weight:500;letter-spacing:.04em;padding:3px 9px;white-space:nowrap;text-transform:uppercase}
.card-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.icon-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:30px;height:30px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .18s}
/* Edit: always visible; Delete e Aprender e Destaque: admin-only */
.icon-btn.admin-only{display:none}
.admin-mode .icon-btn.admin-only{display:flex}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.icon-btn.star{color:var(--gold);border-color:rgba(196,57,107,.3);background:var(--gold-dim)}
.icon-btn.del:hover{border-color:var(--red);color:var(--red);background:var(--red-dim)}
/* Checkbox de seleção: só no admin-mode */
.card-check-input{display:none}
.admin-mode .card-check-input{display:inline-block;width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.card-body{padding:0 16px 14px}
.toggle-lyrics{background:none;border:none;color:var(--gold);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px;opacity:.8;transition:opacity .2s}
.toggle-lyrics:hover{opacity:1}
.lyrics-text{display:none;margin-top:10px;padding:14px;border-left:2px solid rgba(196,57,107,.2);border-radius:0 6px 6px 0;white-space:pre-wrap;line-height:1.85;font-size:15px;color:var(--text);font-style:italic;font-weight:300;font-family:'Crimson Pro',Georgia,serif}
.lyrics-text.open{display:block}
.yt-toggle-btn{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:var(--red-dim);border:1px solid rgba(184,64,64,.3);color:#c0392b;padding:7px 14px;border-radius:5px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.yt-toggle-btn:hover{background:rgba(184,64,64,.15)}
.yt-player-wrap{margin-top:12px;border-radius:8px;overflow:hidden;background:#000;aspect-ratio:16/5;display:none}
.yt-player-wrap.open{display:block}
.yt-player-wrap iframe{width:100%;height:100%;border:none;display:block}
.yt-btn{display:inline-flex;align-items:center;gap:6px;margin-top:6px;background:var(--red-dim);border:1px solid rgba(184,64,64,.3);color:#e07070;padding:7px 14px;border-radius:5px;text-decoration:none;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;transition:all .2s}
.yt-btn:hover{background:rgba(184,64,64,.2)}
.empty{text-align:center;padding:60px 20px;color:var(--text-dim)}
.empty-icon{font-size:36px;opacity:.3;margin-bottom:14px}
.count-info{text-align:center;font-size:12px;color:var(--text-dim);font-family:'Cinzel',serif;letter-spacing:.08em;padding:4px 0 8px}

/* ── LIST MODE ── */
.list-section-header{font-size:.72rem;font-weight:700;color:#9a7000;letter-spacing:.08em;text-transform:uppercase;padding:10px 14px 4px;display:flex;align-items:center;gap:6px}
.list-section-divider{height:1px;background:#f0d8de;margin:6px 0}

/* ── OVERLAYS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(40,10,20,.55);z-index:2000;align-items:flex-start;justify-content:center;padding:16px;padding-top:max(16px,env(safe-area-inset-top));backdrop-filter:blur(4px);overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#fff;border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:12px;box-shadow:0 8px 40px rgba(196,57,107,.15);width:100%;max-width:560px;max-height:calc(100vh - 48px);overflow-y:auto;padding:28px 24px;position:relative;margin:auto}
.modal h2{font-family:'Cinzel',serif;font-size:18px;color:#b02d5a;margin-bottom:22px;letter-spacing:.06em}
.form-row{margin-bottom:16px}
label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
input[type=text],input[type=url],input[type=date],textarea,select{width:100%;background:transparent;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:6px;font-family:'Crimson Pro',serif;font-size:16px;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=url]:focus,input[type=date]:focus,textarea:focus,select:focus{border-color:var(--gold)}
textarea{resize:vertical;min-height:110px;line-height:1.7}
select option{background:#fff;color:#2a1a22}
.check-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:border-color .2s}
.check-row:hover{border-color:var(--gold)}
.check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--gold)}
.check-label{font-size:14px;color:var(--text)}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--text-dim);padding:9px 20px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;transition:all .2s}
.btn-cancel:hover{border-color:var(--red);color:var(--red)}
.btn-save{background:var(--gold);border:none;color:#fff;padding:9px 24px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;font-weight:700;transition:all .2s}
.btn-save:hover{background:var(--gold-light)}
.btn-close-modal{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--border);color:var(--text-dim);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.btn-close-modal:hover{border-color:var(--red);color:var(--red)}
.detail-lyrics{white-space:pre-wrap;line-height:1.85;font-size:16px;color:var(--text);font-style:italic;font-weight:300;padding:14px;border-left:2px solid rgba(196,57,107,.2);border-radius:0 6px 6px 0}
.pw{display:flex;flex-direction:column;align-items:center;gap:16px;padding:6px 0}
.pw p{color:var(--text-dim);font-size:.9rem;text-align:center}
#pin-input{background:transparent;border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.3em;outline:none;padding:11px 14px;text-align:center;width:100%;transition:border-color .18s}
#pin-input:focus{border-color:var(--gold)}
#pin-error{color:var(--red);font-size:.79rem;display:none}
#admin-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#c0405a,#d4607a);padding:10px 20px;align-items:center;justify-content:center;gap:9px;z-index:600;box-shadow:0 -4px 18px rgba(180,60,90,.25);flex-wrap:wrap}
.loading{text-align:center;padding:60px;color:var(--text-dim)}
.spinner{width:24px;height:24px;border:2px solid rgba(196,57,107,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);background:#fff;border:1px solid var(--gold);color:var(--gold);box-shadow:0 4px 20px rgba(196,57,107,.15);padding:11px 18px;border-radius:7px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.08em;z-index:900;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){header{padding:10px 12px}header p{display:none}#searchInput{width:130px}.filter-btn{padding:4px 9px;font-size:.65rem}}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div>
      <h1>Pontos</h1>
      <p id="subtitle">Bolhas de Luz</p>
    </div>
    <div class="hr">
      <div class="sw">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar ponto…" oninput="renderCards()">
      </div>
      <button class="hbtn" id="btn-admin">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Admin</span>
        <span class="badge-admin" id="admin-badge" style="display:none">✓</span>
      </button>
    </div>
  </div>
  <div class="header-row2">
    <button class="hfbtn active" id="filterAll" onclick="setFilter('all')">Todos</button>
    <button class="hfbtn" id="filterSessao" onclick="setFilter('sessao')">🕯️ Sessão</button>
    <button class="hfbtn" id="filterGuia" onclick="setFilter('guia')">Guias</button>
    <button class="hfbtn" id="filterNoGuia" onclick="setFilter('noguia')">Sem guias</button>
    <button class="hfbtn" id="filterNossos" onclick="setFilter('nossos')">🎙️ Nossos Pontos</button>
    <button class="hfbtn" id="filterAprender" onclick="setFilter('aprender')">📚 Aprender</button>
  </div>
</header>

<div class="cb">
  <div class="ci">
    <div class="ci-filters">
      <select class="filter-select" id="filterLinha" onchange="renderCards()">
        <option value="">Todas as linhas</option>
      </select>
      <select class="filter-select" id="sortBy" onchange="renderCards()">
        <option value="default">Mais recentes</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="linha">Por linha</option>
      </select>
    </div>
    <div class="layout-btns">
      <button class="layout-btn active" id="btn-cards" onclick="setLayout('cards')" title="Cards">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="layout-btn" id="btn-list" onclick="setLayout('list')" title="Lista">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
    <button onclick="openModal()" style="background:var(--gold);border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;padding:6px 11px;flex-shrink:0;display:flex;align-items:center;gap:4px">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Novo
    </button>
  </div>
</div>

<div class="main" id="mainGrid"><div class="loading"><div class="spinner"></div>Carregando pontos...</div></div>
<div class="count-info" id="countInfo"></div>
<div class="bottom-space"></div>

<div id="admin-bar">
  <span style="color:rgba(255,255,255,.7);font-size:.78rem">Modo Admin ativo</span>
  <button class="hbtn" onclick="abrirGerenciarLinhas()" style="background:rgba(255,255,255,.12)">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Linhas
  </button>
  <button class="hbtn" onclick="exportarJSON()" style="background:rgba(255,255,255,.12)">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Backup
  </button>
  <button class="hbtn" onclick="sairAdmin()" style="background:rgba(0,0,0,.15)">Sair</button>
</div>

<!-- BATCH BAR -->
<div class="batch-bar" id="batch-bar">
  <span class="batch-info" id="batch-count">0 selecionados</span>
  <button class="batch-btn" onclick="batchAprender()">📚 Aprender</button>
  <button class="batch-btn" onclick="batchSessao()">🕯️ Sessão</button>
  <button class="batch-btn" onclick="batchLinha()">📂 Linha</button>
  <button class="batch-btn danger" onclick="batchExcluir()">✕ Excluir</button>
  <button class="batch-btn cancel" onclick="limparSelecao()">Cancelar</button>
</div>

<div class="toast" id="toast"></div>

<!-- SENHA -->
<div class="overlay" id="ov-senha">
  <div class="modal" style="max-width:340px">
    <button class="btn-close-modal" onclick="fecharModal('ov-senha')">✕</button>
    <h2 style="text-align:center;margin-bottom:0">Área Admin</h2>
    <div class="pw">
      <svg width="36" height="36" fill="none" stroke="var(--gold)" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <p>Digite a senha para editar os pontos</p>
      <input type="password" id="pin-input" placeholder="••••••" autocomplete="current-password"/>
      <span id="pin-error">Senha incorreta.</span>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn-save" onclick="verificarSenha()">Entrar</button>
    </div>
  </div>
</div>

<!-- EDITAR/NOVO -->
<div class="overlay" id="overlay">
  <div class="modal">
    <button class="btn-close-modal" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Novo Ponto Cantado</h2>
    <input type="hidden" id="editId">
    <div class="form-row"><label>Nome do Ponto *</label><input type="text" id="fNome" placeholder="Nome do ponto cantado..."></div>
    <div class="form-row"><label>Linha de Trabalho</label><select id="fLinha"><option value="">— Selecionar —</option></select></div>
    <div class="form-row"><label>Tipo do ponto</label><input type="text" id="fTipo" placeholder="abertura, firmeza, despedida..."></div>
    <div class="form-row"><label>Letra / Texto</label><textarea id="fLetra" placeholder="Cole aqui a letra do ponto..."></textarea></div>
    <div class="form-row"><label>Link do YouTube (opcional)</label><input type="url" id="fYt" placeholder="https://youtube.com/..."></div>
    <div class="form-row">
      <label>Áudio gravado — opcional (🎙️ Nossos Pontos)</label>
      <div class="upload-area" onclick="document.getElementById('fAudioFile').click()">
        <input type="file" id="fAudioFile" accept="audio/*" onchange="previewAudio(this)">
        <label class="upload-label">
          <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M12 18.5a6.5 6.5 0 1 0 0-13 6.5 6.5 0 0 0 0 13z"/><path d="M9.5 11.5l2.5-2.5 2.5 2.5"/><path d="M12 9v6"/></svg>
          <span id="audioFileName">Toque para escolher um áudio</span>
        </label>
        <div class="upload-progress" id="uploadProgress"><div class="upload-progress-bar" id="uploadProgressBar"></div></div>
      </div>
      <span id="audioCurrentUrl" style="font-size:.72rem;color:var(--text-dim);margin-top:4px;display:none"></span>
      <div id="edit-audio-preview" style="display:none;margin-top:8px">
        <audio id="edit-audio-player" controls preload="metadata" style="width:100%;border-radius:8px;accent-color:#c4396b"></audio>
        <p style="font-size:.72rem;color:var(--text-dim);margin-top:4px">🎵 Ouça e use 📍 para marcar os tempos de cada trecho</p>
      </div>
    </div>

    <!-- SEGMENTOS: trecho único + multi-seg -->
    <div id="seg-area" style="display:none">
      <div class="form-row" style="margin-bottom:8px">
        <label>Trecho do áudio <span style="font-size:.68rem;letter-spacing:0;text-transform:none;color:rgba(80,30,50,.4)">(opcional — deixe em branco para usar o áudio inteiro)</span></label>
        <div class="single-timing">
          <div class="single-timing-row">
            <label style="font-size:.68rem">Início</label>
            <div class="single-timing-input">
              <input class="seg-time" type="text" id="fAudioStart" placeholder="0:00" style="flex:1">
              <button class="btn-mark" onclick="marcarTempoForm('fAudioStart')" title="Capturar posição atual">📍</button>
            </div>
          </div>
          <div class="single-timing-row">
            <label style="font-size:.68rem">Fim</label>
            <div class="single-timing-input">
              <input class="seg-time" type="text" id="fAudioEnd" placeholder="0:00" style="flex:1">
              <button class="btn-mark" onclick="marcarTempoForm('fAudioEnd')" title="Capturar posição atual">📍</button>
            </div>
          </div>
        </div>
      </div>
      <!-- Multi-seg: só para novos pontos -->
      <div id="seg-multi-wrap">
        <label class="seg-toggle">
          <input type="checkbox" id="fMultiSeg" onchange="toggleMultiSeg(this.checked)">
          <span>Este áudio tem vários pontos — definir trechos separados</span>
        </label>
        <div id="seg-list" class="seg-list" style="display:none"></div>
        <button type="button" class="btn-add-seg" id="btn-add-seg" onclick="adicionarSegmento()" style="display:none">+ Adicionar trecho</button>
      </div>
    </div>

    <div class="form-row"><label>Data da gravação (opcional)</label><input type="date" id="fDataGravacao"></div>
    <div class="form-row"><label>É de um Guia Nosso?</label><label class="check-row"><input type="checkbox" id="fIsGuia" onchange="toggleGuiaField()"><span class="check-label">Sim, pertence a um guia do terreiro</span></label></div>
    <div class="form-row" id="guiaField" style="display:none"><label>Qual Guia</label><input type="text" id="fGuia" placeholder="Nome do guia..."></div>
    <div class="form-row"><label>Postado por</label><input type="text" id="fPostadoPor" placeholder="Seu nome..."></div>
    <div class="modal-footer"><button class="btn-cancel" onclick="closeModal()">Cancelar</button><button class="btn-save" onclick="savePonto()">Salvar Ponto</button></div>
  </div>
</div>

<!-- DETALHE -->
<div class="overlay" id="ov-detalhe">
  <div class="modal" style="max-width:560px">
    <button class="btn-close-modal" onclick="fecharModal('ov-detalhe')">✕</button>
    <div id="detalhe-body" style="display:flex;flex-direction:column;gap:14px"></div>
  </div>
</div>

<!-- GERENCIAR LINHAS -->
<div class="overlay" id="ov-linhas">
  <div class="modal" style="max-width:400px">
    <button class="btn-close-modal" onclick="fecharModal('ov-linhas')">✕</button>
    <h2>Linhas de Trabalho</h2>
    <div id="linhas-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;min-height:40px"></div>
    <div class="linhas-add-row">
      <input type="text" id="nova-linha-input" placeholder="Nome da linha...">
      <button class="btn-save" onclick="adicionarLinha()" style="padding:9px 16px;flex-shrink:0">Adicionar</button>
    </div>
  </div>
</div>

<!-- MODAL ERRO -->
<div class="overlay" id="ov-erro">
  <div class="modal" style="max-width:400px">
    <button class="btn-close-modal" onclick="fecharModal('ov-erro')">✕</button>
    <h2 style="color:#b84040;font-size:1rem;margin-bottom:12px">❌ Erro</h2>
    <pre id="erro-msg" style="background:#fff5f5;border:1px solid #fcc;border-radius:8px;padding:12px;font-size:.75rem;line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:50vh;overflow-y:auto;color:#7a1a22;font-family:monospace"></pre>
    <div style="display:flex;justify-content:flex-end;margin-top:12px">
      <button class="btn-cancel" onclick="fecharModal('ov-erro')">Fechar</button>
    </div>
  </div>
</div>

<script>
// ── CONFIGURAÇÃO ──
// Para trocar a senha: substitua o valor de ADMIN_HASH por btoa('nova_senha')
const ADMIN_HASH = btoa('terreiro');
const API = '/api/pontos';

// ── ESTADO ──
let adminMode = false;
let currentLayout = 'cards';
let pontos = [];
let currentFilter = 'all';
let selectedIds = new Set();
let segmentos = [];
let linhas = [];

// ── LINHAS ──
function loadLinhas() {
  try { linhas = JSON.parse(localStorage.getItem('pontos_linhas') || '[]'); }
  catch { linhas = []; }
  refreshLinhaSelects();
}

function saveLinhas() {
  localStorage.setItem('pontos_linhas', JSON.stringify(linhas));
  refreshLinhaSelects();
}

function syncLinhasFromData() {
  const existing = new Set(linhas.map(l => l.toLowerCase()));
  pontos.forEach(p => {
    if (p.linha && !existing.has(p.linha.toLowerCase())) {
      linhas.push(p.linha);
      existing.add(p.linha.toLowerCase());
    }
  });
  saveLinhas();
}

function refreshLinhaSelects() {
  const filterVal = document.getElementById('filterLinha')?.value;
  const formVal = document.getElementById('fLinha')?.value;
  const opts = linhas.map(l => `<option value="${esc(l)}">${esc(l)}</option>`).join('');
  const fSel = document.getElementById('filterLinha');
  if (fSel) {
    fSel.innerHTML = '<option value="">Todas as linhas</option>' + opts;
    if (filterVal) fSel.value = filterVal;
  }
  const fForm = document.getElementById('fLinha');
  if (fForm) {
    fForm.innerHTML = '<option value="">— Selecionar —</option>' + opts;
    if (formVal) fForm.value = formVal;
  }
}

function abrirGerenciarLinhas() {
  renderLinhasModal();
  abrirModal('ov-linhas');
}

function renderLinhasModal() {
  const el = document.getElementById('linhas-list');
  if (!linhas.length) {
    el.innerHTML = '<p class="linhas-empty">Nenhuma linha cadastrada ainda.</p>';
    return;
  }
  el.innerHTML = linhas.map((l, i) => `
    <div class="linha-item">
      <span class="linha-item-name">${esc(l)}</span>
      <button class="btn-rm-linha" onclick="removerLinha(${i})" title="Remover">✕</button>
    </div>`).join('');
}

function adicionarLinha() {
  const input = document.getElementById('nova-linha-input');
  const nome = input.value.trim();
  if (!nome) return;
  if (linhas.some(l => l.toLowerCase() === nome.toLowerCase())) {
    toast('Linha já existe!'); return;
  }
  linhas.push(nome);
  saveLinhas();
  input.value = '';
  renderLinhasModal();
  toast('Linha adicionada!');
}

function removerLinha(i) {
  if (!confirm(`Remover a linha "${linhas[i]}"? Os pontos vinculados a ela não serão afetados.`)) return;
  linhas.splice(i, 1);
  saveLinhas();
  renderLinhasModal();
  toast('Linha removida!');
}

document.getElementById('nova-linha-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') adicionarLinha();
});

// ── ADMIN ──
document.getElementById('btn-admin').addEventListener('click', () => {
  if (adminMode) { sairAdmin(); return; }
  abrirModal('ov-senha');
  setTimeout(() => document.getElementById('pin-input').focus(), 100);
});

document.getElementById('pin-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') verificarSenha();
});

function verificarSenha() {
  if (btoa(document.getElementById('pin-input').value) === ADMIN_HASH) {
    fecharModal('ov-senha');
    document.getElementById('pin-input').value = '';
    document.getElementById('pin-error').style.display = 'none';
    ativarAdmin();
  } else {
    document.getElementById('pin-error').style.display = 'block';
    document.getElementById('pin-input').select();
  }
}

function ativarAdmin() {
  adminMode = true;
  document.body.classList.add('admin-mode');
  document.getElementById('admin-badge').style.display = '';
  document.getElementById('admin-bar').style.display = 'flex';
  document.getElementById('subtitle').textContent = '✏️ Modo edição ativo';
}

function sairAdmin() {
  adminMode = false;
  document.body.classList.remove('admin-mode');
  document.getElementById('admin-badge').style.display = 'none';
  document.getElementById('admin-bar').style.display = 'none';
  document.getElementById('subtitle').textContent = 'Bolhas de Luz';
  limparSelecao();
}

// ── MODAIS ──
function abrirModal(id) { document.getElementById(id).classList.add('open'); }

function fecharModal(id) {
  document.getElementById(id).classList.remove('open');
  document.querySelectorAll('#' + id + ' audio').forEach(a => a.pause());
  if (id === 'overlay') {
    const ep = document.getElementById('edit-audio-player');
    if (ep) ep.pause();
  }
}

// Escape fecha qualquer modal aberto
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.overlay.open').forEach(o => {
      const id = o.id;
      o.classList.remove('open');
      o.querySelectorAll('audio').forEach(a => a.pause());
    });
    const ep = document.getElementById('edit-audio-player');
    if (ep) ep.pause();
  }
});

document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) {
      fecharModal(o.id);
    }
  });
});

// ── LAYOUT ──
function setLayout(l) {
  currentLayout = l;
  localStorage.setItem('pontos_layout', l);
  document.getElementById('btn-cards').classList.toggle('active', l === 'cards');
  document.getElementById('btn-list').classList.toggle('active', l === 'list');
  document.getElementById('mainGrid').classList.toggle('layout-list', l === 'list');
  renderCards();
}

// ── FILTROS ──
window.setFilter = f => {
  currentFilter = f;
  document.querySelectorAll('.hfbtn').forEach(b => b.classList.remove('active'));
  const map = { all:'filterAll', sessao:'filterSessao', guia:'filterGuia', noguia:'filterNoGuia', nossos:'filterNossos', aprender:'filterAprender' };
  if (map[f]) document.getElementById(map[f]).classList.add('active');
  renderCards();
};

// ── SELEÇÃO EM LOTE ──
function toggleSelecao(id, checked) {
  const sid = String(id);
  if (checked) selectedIds.add(sid);
  else selectedIds.delete(sid);
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) card.classList.toggle('selecionado', checked);
  updateBatchBar();
}

function updateBatchBar() {
  const n = selectedIds.size;
  document.getElementById('batch-count').textContent = n + ' selecionado' + (n !== 1 ? 's' : '');
  document.getElementById('batch-bar').classList.toggle('open', n > 0);
}

function limparSelecao() {
  selectedIds.clear();
  document.querySelectorAll('.card-check-input').forEach(cb => cb.checked = false);
  document.querySelectorAll('.card.selecionado').forEach(c => c.classList.remove('selecionado'));
  updateBatchBar();
}

async function batchAprender() {
  if (!selectedIds.size) return;
  for (const id of selectedIds) {
    const p = pontos.find(x => String(x.id) === id);
    if (!p) continue;

// ── CUSTOM PLAYER ──
function cpReady(pid, start) {
  const a = document.getElementById(pid);
  if (!a) return;
  const dur = a.duration;
  if (dur && !isNaN(dur)) document.getElementById(pid + '-dur').textContent = formatTime(dur);
  if (start != null) a.currentTime = start;
}

function cpToggle(pid, start) {
  const a = document.getElementById(pid);
  if (!a) return;
  if (a.paused) {
    a.play().then(() => {
      if (start != null && a.currentTime < start - 0.5) a.currentTime = start;
    }).catch(e => console.warn(e));
    document.getElementById(pid + '-playbtn').textContent = '⏸';
  } else {
    a.pause();
    document.getElementById(pid + '-playbtn').textContent = '▶';
  }
}

function cpUpdate(pid, start, end) {
  const a = document.getElementById(pid);
  if (!a) return;
  const t = a.currentTime;
  const dur = a.duration || 0;
  if (end != null && t >= end - 0.08) {
    a.pause();
    a.currentTime = start != null ? start : 0;
    document.getElementById(pid + '-playbtn').textContent = '▶';
  }
  if (dur > 0) {
    const pct = (t / dur * 100).toFixed(2);
    const fill = document.getElementById(pid + '-fill');
    const thumb = document.getElementById(pid + '-thumb');
    if (fill) fill.style.width = pct + '%';
    if (thumb) thumb.style.left = pct + '%';
  }
  const el = document.getElementById(pid + '-cur');
  if (el) el.textContent = formatTime(t);
  if (!a.paused) {
    const btn = document.getElementById(pid + '-playbtn');
    if (btn) btn.textContent = '⏸';
  }
}

function cpSeekStart(e, pid) {
  e.preventDefault();
  const a = document.getElementById(pid);
  if (!a || !a.duration) return;
  const bar = document.getElementById(pid + '-bar');
  const seek = (clientX) => {
    const rect = bar.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    a.currentTime = pct * a.duration;
  };
  const getX = ev => ev.touches ? ev.touches[0].clientX : ev.clientX;
  seek(getX(e));
  const onMove = ev => { ev.preventDefault(); seek(getX(ev)); };
  const onUp = () => {
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('touchmove', onMove);
    window.removeEventListener('mouseup', onUp);
    window.removeEventListener('touchend', onUp);
  };
  window.addEventListener('mousemove', onMove, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);
}

function buildAudioPlayer(p) {
  const pid = 'cp' + String(p.id).replace(/[^a-z0-9]/gi, '').slice(-8);
  const start = p.audioStart != null ? Number(p.audioStart) : null;
  const end = p.audioEnd != null ? Number(p.audioEnd) : null;
  let src = p.audioUrl;
  if (start != null) {
    src += '#t=' + start.toFixed(1);
    if (end != null) src += ',' + end.toFixed(1);
  }
  const segLabel = start != null
    ? `▶ ${formatTime(start)}${end != null ? ' — ' + formatTime(end) : ''}`
    : '';
  return `<div class="cplayer" id="${pid}-wrap">
    <audio id="${pid}" preload="metadata" src="${src}"
      ontimeupdate="cpUpdate('${pid}',${start || 'null'},${end || 'null'})"
      onloadedmetadata="cpReady('${pid}',${start || 'null'})">
    </audio>
    <div class="cplayer-time">
      <span id="${pid}-cur">0:00</span>
      <span id="${pid}-dur">—</span>
    </div>
    <div class="cplayer-bar-wrap" id="${pid}-bar"
      onmousedown="cpSeekStart(event,'${pid}')"
      ontouchstart="cpSeekStart(event,'${pid}')">
      <div class="cplayer-track">
        <div class="cplayer-fill" id="${pid}-fill" style="width:0%"></div>
        <div class="cplayer-thumb" id="${pid}-thumb" style="left:0%"></div>
      </div>
    </div>
    <div class="cplayer-controls">
      <button class="cplayer-btn" onclick="cpToggle('${pid}',${start || 'null'})" id="${pid}-playbtn">▶</button>
      ${segLabel ? `<span class="cplayer-segment">${segLabel}</span>` : ''}
    </div>
  </div>`;
}

function formatTime(s) {
  if (s == null) return '';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function formatTimeField(s) {
  if (s == null) return '';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  const ms = Math.round((s % 1) * 10);
  return m + ':' + (sec < 10 ? '0' : '') + sec + (ms > 0 ? '.' + ms : '');
}

// Marca tempo no player do form para trecho único
function marcarTempoForm(inputId) {
  const player = document.getElementById('edit-audio-player');
  if (!player || !player.src || player.readyState < 1) {
    alert('Aguarde o áudio carregar antes de marcar.');

// Marca tempo nos segmentos multi-ponto
function marcarTempo(inputId, idx, campo) {
  const player = document.getElementById('edit-audio-player');
  if (!player || !player.src || player.readyState < 1) {
    alert('Aguarde o áudio carregar antes de marcar.');
    return;
  }
  const t = player.currentTime;
  const val = formatTimeField(t);
  document.getElementById(inputId).value = val;

  el.style.borderColor = '#2a7a60';
  el.style.background = '#e8f4f0';
  setTimeout(() => { el.style.borderColor = ''; el.style.background = ''; }, 800);
}

function parseTime(str) {
  if (!str) return null;
  const parts = str.trim().split(':');
  if (parts.length === 2) return parseFloat(parts[0]) * 60 + parseFloat(parts[1]);
  if (parts.length === 3) return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
  return null;
}

async function previewAudio(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('audioFileName').textContent = '⏳ Enviando ' + file.name + '...';
  const urlEl = document.getElementById('audioCurrentUrl');
  urlEl.textContent = ''; urlEl.dataset.url = ''; urlEl.style.display = 'none';
  const uploaded = await uploadAudioToR2(file);
  if (uploaded) {
    document.getElementById('audioFileName').textContent = '✅ ' + file.name;
    urlEl.textContent = '🎵 Áudio pronto para salvar';
    urlEl.dataset.url = uploaded;
    urlEl.style.display = 'block';
    document.getElementById('seg-area').style.display = 'block';
    // Multi-seg só aparece para novos pontos
    const isEditing = !!document.getElementById('editId').value;
    document.getElementById('seg-multi-wrap').style.display = isEditing ? 'none' : 'block';
    const prev = document.getElementById('edit-audio-preview');
    const player = document.getElementById('edit-audio-player');

    prev.style.display = 'block';
  } else {
    document.getElementById('audioFileName').textContent = '❌ Falhou — tente outro arquivo';
    document.getElementById('seg-area').style.display = 'none';
  }
}

async function uploadAudioToR2(file) {
  const progressWrap = document.getElementById('uploadProgress');
  const progressBar = document.getElementById('uploadProgressBar');
  progressWrap.style.display = 'block';
  progressBar.style.width = '30%';
  try {
    const formData = new FormData();
    formData.append('file', file);
    const res = await fetch('/api/upload', { method:'POST', body:formData });
    progressBar.style.width = '100%';
    setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0'; }, 800);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Upload falhou'); }
    const { url } = await res.json();
    return url;
  } catch (e) {
    progressWrap.style.display = 'none';
    mostrarErro('Erro no upload de áudio', e);
    return null;
  }
}

// ── RENDER ──
window.renderCards = () => {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const linhaFilter = document.getElementById('filterLinha').value;
  const sortBy = document.getElementById('sortBy').value;

  let filtered = pontos.filter(p => {
    const match = !search
      || (p.nome || '').toLowerCase().includes(search)
      || (p.guia || '').toLowerCase().includes(search)
      || (p.letra || '').toLowerCase().includes(search)
      || (p.postadoPor || '').toLowerCase().includes(search);
    if (!match) return false;
    if (linhaFilter && (p.linha || '') !== linhaFilter) return false;
    if (currentFilter === 'sessao') return p.destaque;
    if (currentFilter === 'guia') return p.isGuia;
    if (currentFilter === 'noguia') return !p.isGuia;
    if (currentFilter === 'nossos') return !!p.audioUrl;
    if (currentFilter === 'aprender') return !!p.aprender;
    return true;
  });

  // Ordenação
  if (sortBy === 'az') filtered.sort((a, b) => (a.nome || '').localeCompare(b.nome || '', 'pt'));
  else if (sortBy === 'za') filtered.sort((a, b) => (b.nome || '').localeCompare(a.nome || '', 'pt'));
  else if (sortBy === 'linha') filtered.sort((a, b) => (a.linha || '').localeCompare(b.linha || '', 'pt') || (a.nome || '').localeCompare(b.nome || '', 'pt'));

  document.getElementById('countInfo').textContent = filtered.length === 0 ? '' :
    filtered.length === 1 ? '1 ponto encontrado' : `${filtered.length} pontos encontrados`;

  const grid = document.getElementById('mainGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🕯️</div><p>Nenhum ponto encontrado.</p></div>';
    return;
  }

  const dest = filtered.filter(p => p.destaque);
  const outros = filtered.filter(p => !p.destaque);

  if (currentLayout === 'list') { renderList(dest, outros, grid); return; }

  let html = '';
  if (dest.length && currentFilter !== 'sessao')
    html += `<div class="sessao-banner"><span class="flame">🕯️</span> Aprender para a Próxima Sessão — ${dest.length} ponto${dest.length > 1 ? 's' : ''}</div>`;
  [...dest, ...outros].forEach(p => { html += cardHtml(p); });
  grid.innerHTML = html;
};

    ${p.letra ? `<div class="detail-lyrics">${esc(p.letra).replace(/\n/g, '<br>')}</div>` : ''}
    ${p.audioUrl ? `${buildAudioPlayer(p)}` : ''}
    ${ytId ? `<button class="yt-toggle-btn" onclick="togglePlayer(this)">▶ Tocar aqui</button><div class="yt-player-wrap"><iframe src="https://www.youtube.com/embed/${ytId}?rel=0&modestbranding=1&controls=1" allowfullscreen allow="autoplay"></iframe></div><a href="${esc(p.yt)}" target="_blank" rel="noopener" class="yt-btn">↗ Abrir no YouTube</a>` : p.yt ? `<a href="${esc(p.yt)}" target="_blank" rel="noopener" class="yt-btn">▶ Abrir no YouTube</a>` : ''}
    ${p.postadoPor ? `<p style="color:rgba(80,30,50,.4);font-size:13px;font-style:italic">por ${esc(p.postadoPor)}</p>` : ''}`;
  abrirModal('ov-detalhe');
}

// ── CRUD ──
window.deletePonto = async id => {
  if (!confirm('Excluir este ponto?')) return;
  await fetch(`${API}?id=${encodeURIComponent(id)}`, { method:'DELETE' });
  pontos = pontos.filter(x => x.id !== id);
  renderCards();
  toast('Ponto excluído');
};

window.openModal = () => {
  document.getElementById('modalTitle').textContent = 'Novo Ponto Cantado';
  document.getElementById('editId').value = '';
  ['fNome','fLetra','fYt','fGuia','fPostadoPor','fTipo','fDataGravacao','fAudioStart','fAudioEnd'].forEach(id => {
    document.getElementById(id).value = '';
  });
  refreshLinhaSelects();
  document.getElementById('fLinha').value = '';
  document.getElementById('fIsGuia').checked = false;
  document.getElementById('guiaField').style.display = 'none';
  document.getElementById('audioCurrentUrl').textContent = '';
  document.getElementById('audioCurrentUrl').dataset.url = '';
  document.getElementById('audioCurrentUrl').style.display = 'none';
  segmentos = [];
  document.getElementById('seg-area').style.display = 'none';
  document.getElementById('seg-multi-wrap').style.display = 'block';
  document.getElementById('fMultiSeg').checked = false;
  document.getElementById('seg-list').style.display = 'none';
  document.getElementById('btn-add-seg').style.display = 'none';
  document.getElementById('audioFileName').textContent = 'Toque para escolher um áudio';
  document.getElementById('fAudioFile').value = '';
  document.getElementById('edit-audio-preview').style.display = 'none';
  abrirModal('overlay');
};

window.openEdit = id => {
  const p = pontos.find(x => x.id === id || String(x.id) === String(id));
  if (!p) return;
  document.getElementById('modalTitle').textContent = 'Editar Ponto';
  document.getElementById('editId').value = id;
  document.getElementById('fNome').value = p.nome || '';
  document.getElementById('fLetra').value = p.letra || '';
  document.getElementById('fYt').value = p.yt || '';
  document.getElementById('fIsGuia').checked = !!p.isGuia;
  document.getElementById('fGuia').value = p.guia || '';
  document.getElementById('fPostadoPor').value = p.postadoPor || '';
  document.getElementById('fTipo').value = p.tipo || '';
  document.getElementById('fDataGravacao').value = p.dataGravacao || '';
  document.getElementById('guiaField').style.display = p.isGuia ? 'block' : 'none';

  // Garantir que a linha do ponto existe nas opções
  if (p.linha && !linhas.some(l => l.toLowerCase() === p.linha.toLowerCase())) {
    linhas.push(p.linha);
    saveLinhas();
  } else {
    refreshLinhaSelects();
  }
  document.getElementById('fLinha').value = p.linha || '';

  // audioStart / audioEnd
  document.getElementById('fAudioStart').value = p.audioStart != null ? formatTimeField(p.audioStart) : '';
  document.getElementById('fAudioEnd').value = p.audioEnd != null ? formatTimeField(p.audioEnd) : '';

  const urlEl = document.getElementById('audioCurrentUrl');
  if (p.audioUrl) {
    urlEl.textContent = '🎵 ' + p.audioUrl.split('/').pop();
    urlEl.dataset.url = p.audioUrl;
    urlEl.style.display = 'block';
    const prev = document.getElementById('edit-audio-preview');
    const player = document.getElementById('edit-audio-player');
    player.src = p.audioUrl;
    prev.style.display = 'block';
    document.getElementById('seg-area').style.display = 'block';
    // Edição: sem multi-seg
    document.getElementById('seg-multi-wrap').style.display = 'none';
  } else {
    urlEl.textContent = ''; urlEl.dataset.url = ''; urlEl.style.display = 'none';
    document.getElementById('edit-audio-preview').style.display = 'none';
    document.getElementById('seg-area').style.display = 'none';
    document.getElementById('seg-multi-wrap').style.display = 'block';
  }

  segmentos = [];
  document.getElementById('fMultiSeg').checked = false;
  document.getElementById('seg-list').style.display = 'none';
  document.getElementById('btn-add-seg').style.display = 'none';
  document.getElementById('audioFileName').textContent = 'Toque para escolher um áudio';
  document.getElementById('fAudioFile').value = '';

  abrirModal('overlay');
};

window.closeModal = () => fecharModal('overlay');

window.toggleGuiaField = () => {
  document.getElementById('guiaField').style.display = document.getElementById('fIsGuia').checked ? 'block' : 'none';
};

window.savePonto = async () => {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { alert('Informe o nome do ponto.'); return; }
  const editId = document.getElementById('editId').value;
  const audioUrl = document.getElementById('audioCurrentUrl').dataset.url || '';
  const audioStart = parseTime(document.getElementById('fAudioStart').value);
  const audioEnd = parseTime(document.getElementById('fAudioEnd').value);
  const data = {
    nome,
    linha: document.getElementById('fLinha').value,
    tipo: document.getElementById('fTipo').value.trim(),
    letra: document.getElementById('fLetra').value.trim(),
    yt: document.getElementById('fYt').value.trim(),
    audioUrl,
    audioStart,
    audioEnd,
    isGuia: document.getElementById('fIsGuia').checked,
    guia: document.getElementById('fIsGuia').checked ? document.getElementById('fGuia').value.trim() : '',
    postadoPor: document.getElementById('fPostadoPor').value.trim(),
    dataGravacao: document.getElementById('fDataGravacao').value || '',
    destaque: editId ? (pontos.find(x => x.id === editId) || {}).destaque || false : false
  };
  const multiSeg = document.getElementById('fMultiSeg').checked;
  try {
    if (editId) {
      const res = await fetch(API, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id:editId, ...data }) });
      if (!res.ok) throw new Error(await res.text());
      const updated = await res.json();
      const idx = pontos.findIndex(x => x.id === editId);
      if (idx >= 0) pontos[idx] = updated;
      toast('Ponto atualizado!');
    } else if (multiSeg && segmentos.length > 0) {
      let criados = 0;
      for (const seg of segmentos) {
        if (!seg.nome.trim()) continue;
        const segData = { ...data, nome:seg.nome.trim(), audioStart:parseTime(seg.inicio), audioEnd:parseTime(seg.fim) };
        const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(segData) });
        if (!res.ok) throw new Error(await res.text());
        pontos.unshift(await res.json());
        criados++;
      }
      toast(`✅ ${criados} ponto${criados > 1 ? 's' : ''} criado${criados > 1 ? 's' : ''}!`);
    } else {
      const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      if (!res.ok) throw new Error(await res.text());
      pontos.unshift(await res.json());
      toast('Ponto salvo!');
    }
    closeModal(); renderCards();
  } catch (e) {
    mostrarErro('Erro ao salvar ponto', e);
  }
};

// ── UTILITÁRIOS ──
function extractYtId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m ? m[1] : null;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

window.exportarJSON = () => {
  if (!pontos.length) { toast('Nenhum ponto para exportar'); return; }
  const blob = new Blob([JSON.stringify(pontos, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `pontos-cantados-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('Backup baixado!');
};

window.toggleLyrics = btn => {
  const el = btn.nextElementSibling;
  const open = el.classList.toggle('open');
  btn.textContent = open ? '▾ Ocultar letra' : '▸ Ver letra';
};

window.togglePlayer = btn => {
  const wrap = btn.nextElementSibling;
  const isOpen = wrap.classList.toggle('open');
  btn.textContent = isOpen ? '⏹ Fechar player' : '▶ Tocar aqui';
  if (!isOpen) { const iframe = wrap.querySelector('iframe'); if (iframe) iframe.src = iframe.src; }
};

// ── ERROS ──
const errosJs = [];
window.addEventListener('error', e => {
  errosJs.push(e.message + ' (' + e.filename?.split('/').pop() + ':' + e.lineno + ')');
});
window.addEventListener('unhandledrejection', e => {
  errosJs.push('Promise: ' + (e.reason?.message || e.reason));
});

function mostrarErro(contexto, err) {
  const lines = [
    '📍 Contexto: ' + contexto,
    '❌ Erro: ' + (err?.message || String(err)),
  ];
  if (errosJs.length) lines.push('\n🔴 Erros JS capturados:\n' + errosJs.join('\n'));
  document.getElementById('erro-msg').textContent = lines.join('\n');
  abrirModal('ov-erro');
}

// ── INIT ──
loadLinhas();
const savedLayout = localStorage.getItem('pontos_layout') || 'cards';
setLayout(savedLayout);
load();
</script>
